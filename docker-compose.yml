version: "3.8"

services:
  artifactory-emulator:
    build:
      context: ./docker/artifactory-emulator
    container_name: skills-artifactory-emulator
    ports:
      - "8082:8082"
    volumes:
      - emulator-data:/data
    environment:
      - DATA_DIR=/data
      - PORT=8082
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/artifactory/api/system/ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - skills-net

  bootstrap:
    image: curlimages/curl:latest
    container_name: skills-bootstrap
    depends_on:
      artifactory-emulator:
        condition: service_healthy
    volumes:
      - ./docker/jfrog/bootstrap.sh:/bootstrap.sh:ro
      - ./docker/jfrog/skills/text-summarizer/SKILL.md:/skills/text-summarizer/SKILL.md:ro
    environment:
      - ARTIFACTORY_URL=http://artifactory-emulator:8082
    entrypoint: ["sh", "/bootstrap.sh"]
    networks:
      - skills-net
    restart: "no"

  mcp-server:
    build:
      context: .
      dockerfile: docker/mcp-server/Dockerfile
    container_name: skills-mcp-server
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      - ARTIFACTORY_URL=${ARTIFACTORY_URL:-http://artifactory-emulator:8082}
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - skills-net

volumes:
  emulator-data:

networks:
  skills-net:
    driver: bridge
